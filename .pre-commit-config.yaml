exclude: ^tests/
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: trailing-whitespace
        exclude: "\\.md$"
      - id: end-of-file-fixer
        exclude: "\\.md$"
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: check-xml
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
        exclude: "\\.md$"
